services:
  postgres:
    image: postgres:18-alpine
    container_name: coverletter_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: coverletter_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - coverletter_network

  latex-compiler:
    build:
      context: ./src/CoverLetter.Infrastructure/Latex
      dockerfile: Dockerfile
    image: latexmk-compiler:1
    container_name: latexmk_compiler_builder
    command: echo "LaTeX compiler image built successfully"
    profiles:
      - tools

  prometheus:
    image: prom/prometheus:latest
    container_name: coverletter_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infrastructure/observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infrastructure/observability/prometheus/prometheus-rules.yml:/etc/prometheus/prometheus-rules.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=7d'
      - '--storage.tsdb.retention.size=5GB'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    networks:
      - coverletter_network
    depends_on:
      - postgres

  loki:
    image: grafana/loki:latest
    container_name: coverletter_loki
    ports:
      - "3100:3100"
    volumes:
      - ./infrastructure/observability/loki/loki-config.yml:/etc/loki/local-config.yml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yml
    networks:
      - coverletter_network

  grafana:
    image: grafana/grafana:latest
    container_name: coverletter_grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_SECURITY_ADMIN_USER=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infrastructure/observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infrastructure/observability/grafana/dashboards:/etc/grafana/dashboards:ro
    networks:
      - coverletter_network
    depends_on:
      - prometheus
      - loki

volumes:
  postgres_data:
    driver: local
  prometheus_data:
    driver: local
  loki_data:
    driver: local
  grafana_data:
    driver: local

networks:
  coverletter_network:
    driver: bridge
