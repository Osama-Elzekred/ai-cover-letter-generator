receivers:
  otlp:
    protocols:
      grpc:
        endpoint: otel-collector:4317

processors:
  batch:

  # Remove old histogram buckets and add new ones
  resource_detection:
    detectors: [system, docker]

exporters:
  prometheus:
    endpoint: otel-collector:8889

extensions:
  health_check:
    endpoint: otel-collector:13133

service:
  extensions: [health_check]
  pipelines:
    metrics:
      receivers: [otlp]
      processors: [batch, resource_detection]
      exporters: [prometheus]
