groups:
  - name: api_health
    interval: 30s
    rules:
      # ========== Request-Level Alerts ==========
      - alert: HighErrorRate
        expr: (increase(http_requests_received_total{status=~"5.."}[5m]) / increase(http_requests_received_total[5m])) > 0.05
        for: 5m
        annotations:
          summary: "High error rate detected"
          description: "Error rate is {{ $value | humanizePercentage }} (threshold: 5%)"
          severity: "critical"

      - alert: HighP95Latency
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 5
        for: 5m
        annotations:
          summary: "High request latency detected"
          description: "P95 latency is {{ $value | humanizeDuration }} (threshold: 5s)"
          severity: "warning"

      - alert: SlowEndpoint
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) by (route) > 10
        for: 5m
        annotations:
          summary: "Slow endpoint detected"
          description: "Endpoint {{ $labels.route }} P95 latency is {{ $value | humanizeDuration }}"
          severity: "warning"

      # ========== Resource Alerts ==========
      - alert: HighCPUUsage
        expr: process_cpu_seconds_total > 80
        for: 3m
        annotations:
          summary: "High CPU usage"
          description: "CPU usage is {{ $value | humanizePercentage }}"
          severity: "warning"

      - alert: HighMemoryUsage
        expr: process_resident_memory_bytes / 1024 / 1024 > 512
        for: 3m
        annotations:
          summary: "High memory usage"
          description: "Memory usage is {{ $value | humanize }}MB"
          severity: "warning"

      - alert: CriticalMemoryUsage
        expr: process_resident_memory_bytes / 1024 / 1024 > 750
        for: 1m
        annotations:
          summary: "Critical memory usage - potential OOM"
          description: "Memory usage is {{ $value | humanize }}MB"
          severity: "critical"

      # ========== Exception Tracking ==========
      - alert: HighExceptionRate
        expr: rate(dotnet_exceptions_total[1m]) > 1
        for: 5m
        annotations:
          summary: "High exception rate"
          description: "Exception rate is {{ $value | humanize }} per second"
          severity: "warning"

      # ========== GC Pressure ==========
      - alert: FrequentGarbageCollection
        expr: rate(dotnet_gc_collections_total[1m]) > 10
        for: 5m
        annotations:
          summary: "Frequent garbage collection"
          description: "GC rate is {{ $value | humanize }} per second (memory pressure)"
          severity: "warning"


  - name: business_metrics
    interval: 60s
    rules:
      # ========== Business KPIs ==========
      - alert: CoverLetterGenerationFailures
        expr: count_over_time({app="coverletter-api"} | json | RequestPath="/api/v1/cover-letters" | StatusCode!="200" [5m]) > 10
        for: 5m
        annotations:
          summary: "Cover letter generation failures spike"
          description: "{{ $value }} cover letter requests failed in last 5 minutes"
          severity: "critical"

      - alert: LowCoverLetterSuccessRate
        expr: (count_over_time({app="coverletter-api"} | json | RequestPath="/api/v1/cover-letters" | StatusCode="200" [5m]) / count_over_time({app="coverletter-api"} | json | RequestPath="/api/v1/cover-letters" [5m])) < 0.9
        for: 10m
        annotations:
          summary: "Low cover letter success rate"
          description: "Success rate is {{ $value | humanizePercentage }} (threshold: 90%)"
          severity: "warning"

      - alert: GroqAPIErrors
        expr: count_over_time({app="coverletter-api"} | json | level="error" | Message=~".*groq.*|.*llm.*" [5m]) > 5
        for: 5m
        annotations:
          summary: "Groq/LLM API errors detected"
          description: "{{ $value }} Groq API errors in last 5 minutes"
          severity: "critical"

      - alert: HighCoverLetterLatency
        expr: avg(count_over_time({app="coverletter-api"} | json | RequestPath="/api/v1/cover-letters" | unwrap Elapsed [1m])) > 5000
        for: 5m
        annotations:
          summary: "High cover letter generation latency"
          description: "Average latency is {{ $value | humanize }}ms (threshold: 5000ms)"
          severity: "warning"

      - alert: LaTeXCompilationFailures
        expr: count_over_time({app="coverletter-api"} | json | level="error" | Message=~".*latex.*|.*pdf.*" [5m]) > 3
        for: 5m
        annotations:
          summary: "LaTeX compilation failures detected"
          description: "{{ $value }} LaTeX errors in last 5 minutes"
          severity: "critical"

      - alert: CVParsingFailures
        expr: count_over_time({app="coverletter-api"} | json | RequestPath=~"/api/v1/cv.*" | StatusCode!="200" [5m]) > 5
        for: 5m
        annotations:
          summary: "CV parsing/upload failures"
          description: "{{ $value }} CV operation failures in last 5 minutes"
          severity: "warning"

      - alert: NoActiveUsers
        expr: count(count_over_time({app="coverletter-api"} | json | UserId!="" | RequestPath=~"/api/v1/(cover-letters|cv).*" [5m]) by (UserId)) == 0
        for: 15m
        annotations:
          summary: "No active users - potential service issue"
          description: "No user activity detected in last 15 minutes"
          severity: "warning"


  - name: infrastructure
    interval: 60s
    rules:
      # ========== Database Health ==========
      - alert: DatabaseUnhealthy
        expr: health_database == 0
        for: 2m
        annotations:
          summary: "Database health check failing"
          description: "Database is not responding to health checks"
          severity: "critical"

      - alert: LatexCompilerUnhealthy
        expr: health_latex_compiler == 0
        for: 2m
        annotations:
          summary: "LaTeX compiler health check failing"
          description: "LaTeX compiler container is not responding"
          severity: "critical"

      - alert: MemoryCacheUnhealthy
        expr: health_memory_cache == 0
        for: 2m
        annotations:
          summary: "Memory cache health check failing"
          description: "In-memory cache is not responding"
          severity: "warning"

      # ========== Rate Limiting ==========
      - alert: HighRateLimitingEvents
        expr: count_over_time({app="coverletter-api"} | json | StatusCode="429" [5m]) > 20
        for: 5m
        annotations:
          summary: "High rate limiting events"
          description: "{{ $value }} rate limit rejections in last 5 minutes"
          severity: "warning"


  - name: observability
    interval: 60s
    rules:
      # ========== Logging Pipeline Health ==========
      - alert: LokiHighLogVolume
        expr: count(count_over_time({app="coverletter-api"}[1m])) > 10000
        for: 5m
        annotations:
          summary: "Loki experiencing high log volume"
          description: "Log ingestion rate is very high ({{ $value }} logs/minute)"
          severity: "warning"

      - alert: PrometheusHighScrapeLatency
        expr: prometheus_tsdb_symbol_table_size_bytes / 1024 / 1024 > 100
        for: 10m
        annotations:
          summary: "Prometheus TSDB growing fast"
          description: "Prometheus symbol table is {{ $value | humanize }}MB"
          severity: "warning"
